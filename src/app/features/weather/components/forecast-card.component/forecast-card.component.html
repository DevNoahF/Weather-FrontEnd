@if (response() && !loading()) {
  <div class="result-section">
    <h2 class="resultado">Resultado:</h2>
    <p class="address">{{ response()!.address }}</p>

    <div class="weather-cards">
      @for (day of daysWithIcon(); track day.datetime) {
        <div class="weather-card">
          <img class="weather-icon" [src]="day.iconUrl" [alt]="day.conditions" />
          <h3>{{ day.datetime }}</h3>
          <p class="condition">{{ day.conditions }}</p>
          <div class="temp-info">
            <span class="temp-current">{{ day.temp }}°C</span>
            <div class="temp-range">
              <span class="temp-max">↑ {{ day.tempmax }}°C</span>
              <span class="temp-min">↓ {{ day.tempmin }}°C</span>
            </div>
          </div>
          <p class="humidity">Umidade: {{ day.humidity }}%</p>
        </div>
      }
    </div>
  </div>
}
